<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#F5F0E8"/>
  <!-- Top double rule -->
  <rect x="80" y="100" width="352" height="6" fill="#2C1810"/>
  <rect x="80" y="110" width="352" height="2" fill="#2C1810"/>
  <!-- Letter E -->
  <text x="256" y="340" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="260" fill="#2C1810" letter-spacing="0">E</text>
  <!-- Bottom double rule -->
  <rect x="80" y="390" width="352" height="2" fill="#2C1810"/>
  <rect x="80" y="396" width="352" height="6" fill="#2C1810"/>
  <!-- Gold accent line -->
  <rect x="140" y="416" width="232" height="3" fill="#8B6914"/>
