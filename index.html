<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ELOQUENT — Das Wortduell. Trainiere deine Eloquenz in eleganten Rededuellen mit KI-Bewertung." />
    <meta name="theme-color" content="#F5F0E8" />
    <meta name="color-scheme" content="light" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ELOQUENT" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta property="og:title" content="ELOQUENT — Das Wortduell der Eloquenten" />
    <meta property="og:description" content="Trainiere deine Eloquenz in eleganten Rededuellen mit KI-Bewertung. Spiele gegen Freunde oder finde Gegner weltweit." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://eloquent-iota.vercel.app" />
    <meta property="og:image" content="https://eloquent-iota.vercel.app/og-image.png" />
    <link rel="canonical" href="https://eloquent-iota.vercel.app" />
    <title>ELOQUENT — Das Wortduell der Eloquenten</title>
    <style>
      /* Critical inline styles to prevent FOUC */
      body { background: #F5F0E8; color: #2C1810; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(function(registration) {
          registration.addEventListener('updatefound', function() {
            var newWorker = registration.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
                import('./src/engine/event-bus.js').then(function(mod) {
                  var eventBus = mod.default || mod.eventBus;
                  eventBus.emit('toast:update-available');
                });
              }
            });
          });
        });
      }
    </script>
  </body>
</html>
